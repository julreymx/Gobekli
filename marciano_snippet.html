<style>

      bottom: 20px;

      width: 40px;
      height: 40px;
      cursor: pointer;
      z-index: 9999;
      
      /* Modo Sigiloso (Oculto/Tenue) */
      opacity: 0.1;
      filter: grayscale(100%);
      transition: all 0.3s ease-in-out;
  }

  /* SVG del marciano estilo Pixel Art */
  .jules-os-invitation-svg {
      width: 100%;
      height: 100%;
      shape-rendering: crispEdges;
  }

  /* Modo Activo (Hover): Sale a la luz, a color, brillante y girando */
  .jules-os-invitation:hover {
      opacity: 1;
      filter: grayscale(0%) drop-shadow(0 0 15px #39FF14);
      animation: spin-glitch-marciano 2s infinite steps(4);
  }

  /* Animación de rotación glitch tipo OS Mental */
  @keyframes spin-glitch-marciano {

      50% { transform: rotate(180deg) scale(1.3); filter: hue-rotate(180deg) drop-shadow(0 0 25px #00ffff); }
      100% { transform: rotate(360deg) scale(1); }
  }
</style>
